        <!-- Header Section -->

  <section class="w-full">
    <div
      class="w-full h-[440px] bg-[url('Food-Images/background-image.jpg')] bg-cover bg-no-repeat bg-center flex flex-col justify-center items-center">

      <div>
        <h1
          class="text-white text-center xl:text-5xl lg:text-4xl md:text-3xl sm:text-2xl :text-xl font-bold  p-5 bg-opacity-40 rounded-lg">
          Your Next Favorite Meal Starts Here</h1>
      </div>
      <div class="w-full mx-auto">
        <form>
          <div class="xl:w-1/3 lg:w-[60%] sm:w-[70%] w-[90%] mx-auto flex gap-2 md:mt-4 mt-4 mx-4">
            <input onkeyup="searchFood(event)" type="text" class="border border-white/50 bg-white/80 text-center w-full p-2 rounded-md text-xl text-black font-bold pl-2 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" placeholder="Search your Craving meal here" />
          </div>
        </form>
      </div>
    </div>
  </section>
  <script src="https://unpkg.com/flowbite@1.4.1/dist/flowbite.js"></script>


  <div class="p-4 bg-white dark:bg-gray-900 transition-colors duration-300">
    <h2 class="text-3xl font-bold text-center mb-4 text-gray-900 dark:text-white">
      Explore Delicious Nigerian Meals
    </h2>
    <div class="bg-white rounded-lg shadow-lg px-10 py-2 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
        <!-- Category Selection -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
          <select onchange="categoryCheck(value)" id=""
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            <option value="">All</option>
            <option value="Soup">Soup</option>
            <option value="Main Course">Main Course</option>
            <option value="Swallow">Swallow</option>
            <option value="Breakfast/Snack">Breakfast/Snack</option>
            <option value="Side Dish/Main">Side Dish/Main</option>
            <option value="Snacks/Dessert">Snack/Dessert</option>
            <option value="Appetizer/Side Dish">Appetizer/Side Dish</option>
            <option value="Side Dish/Snack">Side Dish/Snack</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Region</label>
          <select onchange="checkRegion(value)" id=""
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            <option value="">All Regions</option>
            <option value="Northern Nigeria">Northern Nigeria</option>
            <option value="South-West Nigeria">South-West Nigeria</option>
            <option value="South-South Nigeria">South-South Nigeria</option>
            <option value="South-East Nigeria">South-East Nigeria</option>
          </select>
        </div>
        <!-- Toggle Checkboxes -->
        <label class="flex items-center space-x-3 cursor-pointer">
          <div class="relative">
            <input onchange="vegetarianCheck(event)" type="checkbox" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-700 rounded-full peer-checked:bg-blue-600 transition-colors duration-300">
            </div>
            <div
              class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-all duration-300 peer-checked:left-6">
            </div>
          </div>
          <span class="text-gray-900">Vegetarian</span>
        </label>

        <label class="flex items-center space-x-3 cursor-pointer">
          <div class="relative">
            <input onchange="spicyCheck(event)" type="checkbox" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-700 rounded-full peer-checked:bg-red-600 transition-colors duration-300">
            </div>
            <div
              class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-all duration-300 peer-checked:left-6">
            </div>
          </div>
          <span class="text-red-600">Spicy</span>
        </label>
        <!-- Clear Filter Button -->
        <div class="flex items-end">
          <button
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 transform hover:scale-105">
            Clear Filter
          </button>
        </div>
      </div>
    </div>
  </div>

  </div>
  <!-- Spinner -->
  <div id="spinner" style="display: none;" class="border-gray-300 mx-auto mb-5 h-10 w-10 animate-spin rounded-full border-5 border-t-blue-600"></div>

  <!-- Error Message -->
   <div class="px-2 mt-16" id="errorMessage" style="display: none;">
    <!-- Alert Error -->
    <div class=" px-8 mx-auto my-2 rounded-md text-lg flex items-center mx-auto max-w-lg">
        <P class="text-red-800">Something went wrong. <button onclick="retryBtn()" class="underline">Try again</button></P>
    </div>
    <!-- End Alert Error -->

    
    
</div>
  <!-- FOOD CARD SECTION -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 px-10 mb-15" id="show"></div>


  <!-- MODAL -->
  <div id="modal" style="display: none;"
    class="fixed inset-0 z-40 min-h-full overflow-y-auto overflow-x-hidden transition flex items-center">
    <!-- overlay -->
    <div onclick="clearModal()"  aria-hidden="true" class="fixed inset-0 bg-gray-100 opacity-50 w-full h-full cursor-pointer">
    </div>

    <!-- Modal -->
    <div class="relative w-full cursor-pointer pointer-events-none transition my-auto p-4">
      <div
        class="w-full py-2 bg-white cursor-default pointer-events-auto dark:bg-gray-800 relative rounded-xl mx-auto max-w-4xl w-11/12 md:w-3/4">

        <button onclick="clearModal()" tabindex="-1" type="button"
          class="absolute top-2 right-2 rtl:right-auto rtl:left-2 z-50">
          <svg title="Close" tabindex="-1" class="h-4 w-4 cursor-pointer text-gray-400"
            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd"
              d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
              clip-rule="evenodd"></path>
          </svg>
          <span class="sr-only">
            Close
          </span>
        </button>

<!-- Modal details -->

        <div id="modalDetails" class="bg-white dark:bg-gray-900 overflow-y-auto max-h-[90vh]">
          
        </div>
      </div>



    </div>
  </div>
